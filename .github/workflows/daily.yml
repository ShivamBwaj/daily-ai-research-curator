# Monorepo layout: repository root is the parent of `research_agent/`.
# If your repo root IS `research_agent/`, use research_agent/.github/workflows/daily.yml instead.
#
# Schedule: cron is UTC. "30 2 * * *" = 02:30 UTC ≈ 08:00 IST (India, no DST).
#
# If the job does NOT run by itself at that time:
# - Open Actions: look for a run stuck "Waiting" for environment approval (most common).
# - Settings → Environments → env → turn OFF "Required reviewers" and "Wait timer" so cron is unattended.
# - Optional: duplicate secrets into Repository secrets and remove `environment: env` from the job.

name: Daily AI Research Curator

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: research_agent

jobs:
  curator:
    runs-on: ubuntu-latest
    # Matches Environment `env` where your secrets live. If cron never runs unattended, open
    # Settings → Environments → env and DISABLE "Required reviewers" / "Wait timer" (they block schedule).
    environment: env
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: research_agent/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run curator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --run-once
